<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>授权码生成器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        h1 { color: #fff; text-align: center; margin-bottom: 30px; font-size: 28px; }
        .subtitle { color: rgba(255, 255, 255, 0.7); text-align: center; margin-bottom: 30px; font-size: 14px; }
        .input-group { margin-bottom: 25px; }
        label { display: block; color: rgba(255, 255, 255, 0.9); margin-bottom: 10px; font-size: 14px; }
        input[type="text"] {
            width: 100%; padding: 15px 20px; border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px; background: rgba(255, 255, 255, 0.1); color: #fff;
            font-size: 16px; transition: all 0.3s ease; outline: none;
        }
        input[type="text"]:focus {
            border-color: #4facfe; background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.3);
        }
        input[type="text"]::placeholder { color: rgba(255, 255, 255, 0.5); }
        button {
            width: 100%; padding: 16px; border: none; border-radius: 12px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: #fff; font-size: 16px; font-weight: 600; cursor: pointer;
            transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(79, 172, 254, 0.4); }
        button:active { transform: translateY(0); }
        .result-container {
            margin-top: 30px; padding: 25px; background: rgba(0, 0, 0, 0.3);
            border-radius: 12px; display: none; animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .result-label { color: rgba(255, 255, 255, 0.7); font-size: 12px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
        .result-value { color: #4facfe; font-size: 28px; font-weight: 700; font-family: 'Courier New', monospace; letter-spacing: 3px; }
        .copy-btn {
            margin-top: 15px; padding: 10px 20px; background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 8px; color: #fff;
            font-size: 13px; cursor: pointer; transition: all 0.3s ease; width: auto;
        }
        .copy-btn:hover { background: rgba(255, 255, 255, 0.3); }
        .error { color: #ff6b6b; font-size: 13px; margin-top: 8px; display: none; }
        @media (max-width: 480px) {
            .container { padding: 25px; }
            h1 { font-size: 22px; }
            .result-value { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>授权码生成器</h1>
        <p class="subtitle">输入设备ID生成授权码</p>
        
        <div class="input-group">
            <label for="deviceId">设备ID (ro.boot.serialno)</label>
            <input type="text" id="deviceId" placeholder="请输入设备ID" autocomplete="off">
            <div class="error" id="errorMsg">设备ID不能为空</div>
        </div>
        
        <button onclick="generate()">生成授权码</button>
        
        <div class="result-container" id="resultContainer">
            <div class="result-label">授权码</div>
            <div class="result-value" id="authCode"></div>
            <button class="copy-btn" onclick="copyCode()">复制授权码</button>
        </div>
    </div>

    <script>
        const MASK64 = 0xFFFFFFFFFFFFFFFFn;
        const JY_PRIVATE_SALT = "1095633020";

        function rotl64(x, r) {
            r = BigInt(r) & 63n;
            if (r === 0n) return x & MASK64;
            return ((x << r) | (x >> (64n - r))) & MASK64;
        }

        function normalize_id(s) {
            let out = '';
            for (let i = 0; i < s.length; i++) {
                let c = s.charCodeAt(i);
                if (c === 32 || c === 9 || c === 13 || c === 10) continue;
                if (c >= 97 && c <= 122) c -= 32;
                out += String.fromCharCode(c);
            }
            return out;
        }

        function seed_from_salt(salt) {
            let s = 0x6C8E9CF570932BD5n;
            for (let i = 0; i < salt.length; i++) {
                let c = salt.charCodeAt(i);
                if (c < 48 || c > 57) continue;
                let d = BigInt(c - 48 + 1);
                s = (s ^ (d + 0x9E3779B185EBCA87n + (s << 6n) + (s >> 2n))) & MASK64;
                s = rotl64(s, 5n + d);
                s = (s * 0xD6E8FEB86659FD93n) & MASK64;
                s = (s ^ (s >> 31n)) & MASK64;
            }
            return s;
        }

        function mix_step(x, b, k, round) {
            let r = BigInt(round + 1);
            b = BigInt(b) & 0xFFn;
            x = (x ^ (b + 0xA5A5A5A5A5A5A5A5n)) & MASK64;
            x = (x + (k ^ (r * 0x9E3779B185EBCA87n))) & MASK64;
            x = rotl64(x, BigInt(7 + ((Number(b) + round) & 15)));
            x = (x ^ (x >> 27n)) & MASK64;
            x = (x * 0xC2B2AE3D27D4EB4Fn) & MASK64;
            x = (x ^ rotl64(k, BigInt(11 + (round & 7)))) & MASK64;
            x = (x + (b << BigInt((round & 7) * 8))) & MASK64;
            x = (x ^ (x >> 33n)) & MASK64;
            x = (x * 0x9FB21C651E98DF25n) & MASK64;
            x = (x ^ (x >> 29n)) & MASK64;
            return x;
        }

        function base32_60(v) {
            const alpha = "23456789ABCDEFGHJKLMNPQRSTUVWXYZ";
            v = v & 0x0FFFFFFFFFFFFFFFn;
            let out = '';
            for (let i = 0; i < 12; i++) {
                out = alpha[Number(v & 31n)] + out;
                v >>= 5n;
            }
            return out;
        }

        function make_token(device_id) {
            let id = normalize_id(device_id);
            let seed = seed_from_salt(JY_PRIVATE_SALT);
            let a = (seed ^ 0x243F6A8885A308D3n) & MASK64;
            let b = (rotl64(seed, 17n) ^ 0x13198A2E03707344n) & MASK64;
            let k = (seed ^ 0xA4093822299F31D0n) & MASK64;

            for (let i = 0; i < JY_PRIVATE_SALT.length; i++) {
                let c = JY_PRIVATE_SALT.charCodeAt(i);
                if (c < 48 || c > 57) continue;
                a = mix_step(a, c, k, i);
                b = (b ^ rotl64((a + BigInt(c)) & MASK64, BigInt(3 + (i & 15)))) & MASK64;
                k = (k + (b ^ (BigInt(c - 48 + 1) * 0x100000001B3n))) & MASK64;
            }

            for (let i = 0; i < id.length; i++) {
                let c = id.charCodeAt(i);
                a = mix_step(a, c, (k ^ b) & MASK64, i);
                b = mix_step(b, Number((BigInt(c) ^ (a & 0xFFn)) & 0xFFn), (k ^ a) & MASK64, i + 19);
                k = (k ^ rotl64((a + b + BigInt(c)) & MASK64, BigInt(5 + (i & 15)))) & MASK64;
                k = (k * 0xD6E8FEB86659FD93n) & MASK64;
                k = (k ^ (k >> 32n)) & MASK64;
            }

            for (let r = 0; r < 8; r++) {
                a = (a ^ rotl64((b + seed + BigInt(r)) & MASK64, BigInt(9 + r))) & MASK64;
                a = (a * 0xC2B2AE3D27D4EB4Fn) & MASK64;
                a = (a ^ (a >> 31n)) & MASK64;
                b = (b + rotl64((a ^ k ^ BigInt(r)) & MASK64, BigInt(13 + r))) & MASK64;
                b = (b * 0x9FB21C651E98DF25n) & MASK64;
                b = (b ^ (b >> 29n)) & MASK64;
                k = (k ^ (a + b + 0x9E3779B185EBCA87n)) & MASK64;
            }

            let final = (a ^ rotl64(b, 23n) ^ rotl64(k, 41n) ^ seed) & MASK64;
            let code = base32_60(final);
            return "JY-" + code.slice(0,4) + "-" + code.slice(4,8) + "-" + code.slice(8,12);
        }

        function generate() {
            const deviceId = document.getElementById('deviceId').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            const resultContainer = document.getElementById('resultContainer');
            
            if (!deviceId) {
                errorMsg.style.display = 'block';
                resultContainer.style.display = 'none';
                return;
            }
            
            errorMsg.style.display = 'none';
            try {
                const token = make_token(deviceId);
                document.getElementById('authCode').textContent = token;
                resultContainer.style.display = 'block';
            } catch (e) {
                alert('生成失败: ' + e.message);
            }
        }

        function copyCode() {
            const code = document.getElementById('authCode').textContent;
            navigator.clipboard.writeText(code).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.textContent = '已复制!';
                setTimeout(() => btn.textContent = '复制授权码', 2000);
            });
        }

        document.getElementById('deviceId').addEventListener('keypress', e => {
            if (e.key === 'Enter') generate();
        });
    </script>
</body>
</html>
